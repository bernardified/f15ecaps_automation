<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>142 SQN e-CAPS Submitter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #B7410E; /* Rust */
      color: #fff3e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: #7a2a08;
      border: 1px solid #F28500;
      border-radius: 12px;
      padding: 2rem 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    .badge {
      display: inline-block;
      background: #F28500; /* Tangerine */
      color: #fff;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 4px;
      margin-bottom: 0.75rem;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #FFBF00; /* Amber */
      margin-bottom: 0.35rem;
    }

    p.sub {
      font-size: 0.85rem;
      color: #FEBA4F; /* Pastel Orange */
      margin-bottom: 1.75rem;
    }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #FEBA4F; /* Pastel Orange */
      margin-bottom: 0.4rem;
    }

    input[type="text"] {
      width: 100%;
      padding: 0.65rem 0.9rem;
      background: #5c1f05;
      border: 1px solid #F28500;
      border-radius: 7px;
      color: #fff3e0;
      font-size: 1rem;
      letter-spacing: 0.05em;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus {
      border-color: #FFBF00; /* Amber */
    }

    button {
      margin-top: 1.25rem;
      width: 100%;
      padding: 0.75rem;
      background: #FF7900; /* Safety Orange */
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    button:hover:not(:disabled) { background: #F04A00; } /* International Orange */
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    #status {
      margin-top: 1.25rem;
      padding: 0.75rem 1rem;
      border-radius: 7px;
      font-size: 0.875rem;
      display: none;
      line-height: 1.5;
    }

    #status.loading {
      display: block;
      background: #5c1f05;
      border: 1px solid #F28500;
      color: #FEBA4F;
    }

    #status.success {
      display: block;
      background: #3b2000;
      border: 1px solid #FFBF00;
      color: #FFBF00;
    }

    #status.error {
      display: block;
      background: #3b0a00;
      border: 1px solid #E34234; /* Vermillion */
      color: #FF7F50; /* Coral */
    }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid #FEBA4F;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .footer {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: #FEBA4F;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">142 SQN</div>
    <h1>e-CAPS Submitter</h1>
    <p class="sub">Enter your callsign to auto-fill and submit the weekly CAPS form.</p>

    <label for="callsign">Callsign</label>
    <input
      type="text"
      id="callsign"
      placeholder="e.g. CABLE"
      autocomplete="off"
      autocapitalize="characters"
      spellcheck="false"
    />

    <button id="capsBtn" onclick="submitForm('caps')">Submit CAPS</button>
    <button id="opsBtn" onclick="submitForm('opslimit')">Submit Ops Limit</button>

    <div id="status"></div>

    <div class="footer">Runs on Railway — no laptop needed.</div>
  </div>

  <script>
    const BUTTONS = ["capsBtn", "opsBtn"];

    async function submitForm(form) {
      const callsign = document.getElementById("callsign").value.trim();

      if (!callsign) {
        showStatus("error", "Please enter your callsign.");
        return;
      }

      const label = form === "opslimit" ? "Ops Limit" : "CAPS";
      BUTTONS.forEach(id => document.getElementById(id).disabled = true);
      showStatus("loading", '<span class="spinner"></span>Submitting ' + label + ' — this takes ~30 seconds…');

      try {
        const res  = await fetch("/submit", {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body:    JSON.stringify({ callsign, form }),
        });
        const data = await res.json();

        if (data.ok) {
          showStatus("success", "✓ " + (data.message || "Submitted successfully."));
        } else {
          showStatus("error", "✗ " + (data.message || "Submission failed."));
        }
      } catch (err) {
        showStatus("error", "✗ Network error: " + err.message);
      } finally {
        BUTTONS.forEach(id => document.getElementById(id).disabled = false);
      }
    }

    function showStatus(type, html) {
      const el = document.getElementById("status");
      el.className = type;
      el.innerHTML = html;
    }

    // Allow Enter key to submit CAPS (the weekly default)
    document.getElementById("callsign").addEventListener("keydown", e => {
      if (e.key === "Enter") submitForm("caps");
    });
  </script>
</body>
</html>
